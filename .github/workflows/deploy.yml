name: Deploy to Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # test:
  #   uses: ./.github/workflows/e2e-tests.yml

  deploy:
    # needs: test
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install function dependencies
        run: |
          cd functions
          npm ci

      - name: Build application
        run: npm run build

      - name: Build functions
        run: |
          cd functions
          npm run build

      - name: Setup Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate to Firebase
        run: echo "$FIREBASE_SERVICE_ACCOUNT" | base64 -d > firebase-service-account.json
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BASE64 }}

      - name: Set Firebase project
        run: firebase use --token "$FIREBASE_TOKEN" "$FIREBASE_PROJECT_ID"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}

      - name: Deploy to Firebase App Hosting
        run: firebase apphosting:backends:deploy smart-contracts-web-app --token "$FIREBASE_TOKEN"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy Cloud Functions
        run: firebase deploy --only functions --token "$FIREBASE_TOKEN"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy Firestore rules and indexes
        run: firebase deploy --only firestore --token "$FIREBASE_TOKEN"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy Storage rules
        run: firebase deploy --only storage --token "$FIREBASE_TOKEN"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Notify deployment success
        if: success()
        run: |
          echo "🚀 Deployment successful!"
          echo "App Hosting: Deployed to smart-contracts-web-app backend"
          echo "Functions: Deployed successfully"
          echo "Firestore: Rules and indexes updated"
          echo "Storage: Rules updated"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Check the logs above for details."
          exit 1

  cleanup:
    needs: deploy
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Cleanup service account file
        run: |
          if [ -f firebase-service-account.json ]; then
            rm firebase-service-account.json
          fi
